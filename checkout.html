<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser l'achat - Aksess</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --itchio_white_back: #141414;
            --itchio_gray_back: #1f1f1f;
            --itchio_body_color: #e2e2e2;
            --itchio_border_color: #333333;
            --itchio_link_color: #fa5c5c;
        }
        body { 
            background-color: var(--itchio_white_back); 
            color: var(--itchio_body_color); 
            font-family: 'Lato', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .checkout-container {
            background: var(--itchio_gray_back);
            border: 1px solid var(--itchio_border_color);
            padding: 30px; border-radius: 4px; width: 90%; max-width: 500px; text-align: center;
        }
        .game-visual {
            width: 100%; height: 250px; border-radius: 4px; margin-bottom: 20px;
            background: #000; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px solid #444;
        }
        .game-visual img, .game-visual video { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .price-id { color: #888; font-size: 12px; margin-bottom: 20px; font-family: monospace; }
        
        .btn-pay {
            background-color: var(--itchio_link_color);
            color: white; border: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 3px;
            cursor: pointer; width: 100%; transition: opacity 0.2s;
        }
        .btn-pay:disabled { background-color: #555; cursor: not-allowed; }
        .btn-pay:hover:not(:disabled) { opacity: 0.9; }
        
        .status-msg { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div id="visual-container" class="game-visual">
            <!-- Image ou Animation chargée dynamiquement -->
            <p>Chargement du visuel...</p>
        </div>

        <h1 id="product-name">Préparation de la commande...</h1>
        <div id="price-display" class="price-id">...</div>

        <button id="btn-proceed" class="btn-pay" disabled>PROCÉDER AU PAIEMENT</button>
        <p id="status-text" class="status-msg">Initialisation sécurisée...</p>
    </div>

    <script type="module">
        import { supabaseClient, PADDLE_ENV, PADDLE_CLIENT_TOKEN } from './js/config.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const priceId = urlParams.get('price_id');
        const gameSlug = urlParams.get('game');

        const btnProceed = document.getElementById('btn-proceed');
        const statusText = document.getElementById('status-text');

        async function initCheckout() {
            // 1. Vérifier l'auth
            console.log("Recherche du PriceID:", priceId); // Debug console

			const { data: { user } } = await supabaseClient.auth.getUser();
			if (!user) {
				statusText.innerText = "Connexion requise...";
				window.location.href = `login.html`;
				return;
			}

			// Requête simplifiée sans jointure complexe pour tester
			const { data: product, error } = await supabaseClient
				.from('store_products')
				.select('*')
				.eq('price_id', priceId)
				.single();

			if (error || !product) {
				console.error("Erreur Supabase:", error);
				statusText.innerText = "Produit introuvable dans store_products.";
				return;
			}

			// Affichage
			document.getElementById('product-name').innerText = product.name || "Achat In-Game";
			document.getElementById('price-display').innerText = `ID: ${priceId}`;
			
			// Si tu as ajouté image_url dans store_products, on l'utilise. 
			// Sinon on met une image par défaut ou on cherche le jeu.
			const visualUrl = product.image_url || "https://via.placeholder.com/400x250?text=Aksess+Store";
			
			if(product.animation_url) {
				document.getElementById('visual-container').innerHTML = `<video src="${product.animation_url}" autoplay loop muted></video>`;
			} else {
				document.getElementById('visual-container').innerHTML = `<img src="${visualUrl}" alt="Aperçu">`;
			}

			// Initialisation Paddle
			Paddle.Environment.set(PADDLE_ENV);
			Paddle.Initialize({ token: PADDLE_CLIENT_TOKEN });

			btnProceed.disabled = false;
            statusText.innerText = "Prêt pour le paiement.";

            btnProceed.onclick = async () => {
                btnProceed.disabled = true;
                statusText.innerText = "Génération de la transaction Paddle...";

                try {
                    // Appel à ton Edge Function existante
                    const { data, error: funcError } = await supabaseClient.functions.invoke("create-checkout", {
                        body: { 
							price_id: priceId ,
							current_url: window.location.href
							
							}
                    });

                    if (funcError || !data.transaction_id) throw new Error("Erreur Backend");

                    Paddle.Checkout.open({
                        transactionId: data.transaction_id,
                        settings: { displayMode: "overlay", theme: "dark", locale: "fr" }
                    });
                    
                    statusText.innerText = "Fenêtre de paiement ouverte.";
                } catch (err) {
                    alert("Erreur : " + err.message);
                    btnProceed.disabled = false;
                }
            };
        }

        initCheckout();
    </script>
</body>
</html>
