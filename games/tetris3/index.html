		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

.btn-paddle-overlay {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 28px;
        font-size: 16px;
        font-weight: bold;
        color: #ffffff;
        background-color: #00b374; /* Vert Paddle */
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        transition: background 0.2s, transform 0.1s;

    }
    .btn-paddle-overlay:hover { background-color: #009a63; }
    .btn-paddle-overlay:active { transform: translateX(-50%) scale(0.98); }

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>
		<button class="btn-paddle-overlay" onclick="demanderAchat(event,'pri_01kt9ahzm779msh6zqp95gg5xm')">🛒 ACHETER VIA BACKEND</button>
		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":41384,"index.wasm":36021473},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = true;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
		
		<script type="module">
			import { GameSync } from '../../js/game-sync.js';
			import { supabaseClient, PADDLE_ENV, PADDLE_CLIENT_TOKEN } from "../../js/config.js?v=1.0.2";


			// 2. Initialisation Paddle
			if (window.Paddle) {
				Paddle.Environment.set(PADDLE_ENV);
				Paddle.Initialize({ 
					token: PADDLE_CLIENT_TOKEN,
					eventCallback: (data) => { if (data.name === "checkout.error") console.error(data.data); }
				});
			} else {
				console.error("❌ Le script Paddle n'a pas pu être chargé (vérifiez le bloquage COEP/Adblock)");
			}

			// 3. Détermination du Slug (nom du jeu)
			const pathParts = window.location.pathname.split('/').filter(p => p !== "");
			const gamesIndex = pathParts.indexOf("games");
			const slug = (gamesIndex !== -1 && pathParts[gamesIndex + 1]) ? pathParts[gamesIndex + 1] : "default";

			// --- FONCTIONS EXPOSÉES À GODOT ---
			let conflictResolved = false;

			// CHARGEMENT DIRECT(Appelé par SaveManager._ready)
			window.requestRemoteData = async function() {
				try {
					console.log("📥 JS: Analyse de l'intégrité...");
					
					const { data: { user } } = await supabaseClient.auth.getUser();
					const localRaw = localStorage.getItem(`save_${slug}`);
					let localData = null;

					// 1. VÉRIFICATION D'INTÉGRITÉ PRÉALABLE
					if (localRaw) {
						try {
							const envelope = JSON.parse(localRaw);
							// On vérifie la signature (Niveau 1)
							const isValid = await GameSync.verifyLocalSignature(slug, envelope);
							
							if (isValid) {
								localData = envelope.payload;
							} else {
								console.warn("⚠️ Données locales corrompues détectées. Elles seront ignorées.");
								// Si corrompu, on ne propose PAS le choix au joueur
							}
						} catch (e) {
							console.error("❌ Erreur de lecture JSON locale:", e);
						}
					}

					// 2. LOGIQUE DE CONFLIT (Uniquement si localData est VALIDE)
					if (user && localData && localData.is_logged_in === false && !conflictResolved) {
						const { data: remoteRow } = await supabaseClient.from("user_game_data").select("data").eq('user_id', user.id).eq('game_slug', slug).maybeSingle();
						const remoteData = remoteRow?.data;

						if (remoteData) {
							const localTs = localData.saved_at || 0;
							const remoteTs = remoteData.saved_at || 0;
							
							// Si l'écart est significatif, on demande
							if (Math.abs(localTs - remoteTs) > 10000) { 
								const choice = await showConflictModal();
								conflictResolved = true;
								
								if (choice === 'cloud') {
									// On adopte le cloud
									localStorage.setItem(`save_${slug}`, JSON.stringify({
										payload: remoteData,
										signature: await GameSync.generateSignature(JSON.stringify(remoteData))
									}));
									window.on_data_received?.(JSON.stringify(remoteData));
									return;
								}
								// Si 'local', on continue vers GameSync.load qui fera l'upsert sécurisé
							}
						}
					}

					// 3. CHARGEMENT FINAL
					// Si localData était null (car corrompu), load() se rabattra sur le Cloud
					const data = await GameSync.load(slug);
					conflictResolved = true;

					if (data === "TAMPERED_ERROR") {
						window.on_data_received?.("TAMPERED_ERROR");
					} else {
						window.on_data_received?.(data === "NETWORK_ERROR" ? "NETWORK_ERROR" : JSON.stringify(data));
					}

				} catch (e) {
					console.error("💥 Crash requestRemoteData:", e);
					// CRITIQUE : Toujours répondre à Godot pour éviter le freeze
					window.on_data_received?.("NETWORK_ERROR");
				}
			};
			
			// Petite fonction utilitaire pour Godot
			window.get_user_status = function() {
				return localStorage.getItem("sb-axccjtcgesjbpcdigwkp-auth-token"); // Retourne null si déconnecté
			};
			
			// Fonction utilitaire pour afficher la bulle et attendre le clic
			function showConflictModal() {
				return new Promise((resolve) => {
					const overlay = document.getElementById('sync-conflict-overlay');
					overlay.style.display = 'flex';
					
					document.getElementById('btn-keep-local').onclick = () => {
						overlay.style.display = 'none';
						resolve('local');
					};
					
					document.getElementById('btn-keep-cloud').onclick = () => {
						overlay.style.display = 'none';
						resolve('cloud');
					};
				});
			}
			
			let lastKnownUserId = null;

			// On surveille les changements de connexion en temps réel
			supabaseClient.auth.onAuthStateChange((event, session) => {
				const currentUserId = session?.user?.id || null;
				
				// Si l'utilisateur vient de se connecter alors que le jeu tourne déjà
				if (event === "SIGNED_IN" && lastKnownUserId === null) {
					console.log("🔓 Connexion détectée pendant le jeu !");
					window.requestRemoteData(); // Relance la vérification (affichera la bulle si besoin)
				}
				
				lastKnownUserId = currentUserId;
			});

			// SAUVEGARDE LOCALE (Appelé par SaveManager.update_stat)
			window.saveLocal = function(jsonStr) {
				try {
					GameSync.saveLocally(slug, JSON.parse(jsonStr));
				}
				catch(e){
					console.error(e);
				}
			};
			
			//Supression de données cloud
			window.requestDataDelete = async function() {
				const result = await GameSync.deleteData(slug);
				
				if (window.on_data_deleted) {
					window.on_data_received("null"); // On informe le chargeur que les données sont maintenant nulles
					window.on_data_deleted(result);
				}
			};

			// SYNCHRONISATION CLOUD (Appelé par SaveManager.force_cloud_sync)
			window.syncCloud = async function() {
				console.log("☁️ Tentative de synchronisation...");
				try {
					await GameSync.sync(slug);
				}
				catch(e){
					console.error(e);
				}
			};

			// ACHAT
			window.demanderAchat = async function(event, priceId) {
				if (event) { event.preventDefault(); event.stopPropagation(); }
				const checkoutUrl = `../../checkout.html?price_id=${priceId}&game=${slug}`;
				window.open(checkoutUrl, "_blank");
			};
			
			// Récupère les intentions annulées ou échouées non encore vues par le jeu
			window.requestFailedIntents = async function() {
				try {
					const { data: { user } } = await supabaseClient.auth.getUser();
					if (!user) return;

					const { data } = await supabaseClient
						.from('payment_intents')
						.select('id, status, paddle_price_id')
						.eq('user_id', user.id)
						.in('status', ['canceled', 'failed', 'abandoned'])
						.is('completed_at', null);

					if (window.on_failed_intents_received) {
						window.on_failed_intents_received(JSON.stringify(data || []));
					}
				} catch (e) {
					console.error(e);
				}
			};

			// Marque une intention comme "traitée" (pour ne plus afficher le message d'erreur)
			window.markIntentAsNotified = async function(intentId) {
				// On peut par exemple mettre une date dans completed_at pour dire "le joueur a vu l'erreur"
				await supabaseClient
					.from('payment_intents')
					.update({ completed_at: new Date().toISOString() }) 
					.eq('id', intentId);
			};
			
			//marque un produit comme livré
			window.markTransactionsAsProcessed = async function(idsJson) {
				try {
					const ids = JSON.parse(idsJson);
					for (let id of ids) {
						// 1. Récupérer la référence Paddle pour lier les deux tables
						const { data: tx } = await supabaseClient
							.from('wallet_transactions')
							.select('reference_id')
							.eq('id', id)
							.single();

						// 2. Marquer comme traité dans wallet_transactions
						await supabaseClient
							.from('wallet_transactions')
							.update({ metadata: { processed: true } })
							.eq('id', id);

						// 3. Marquer comme livré dans item_purchases (via l'ID de commande Paddle)
						if (tx && tx.reference_id) {
							await supabaseClient
								.from('item_purchases')
								.update({ delivered: true })
								.eq('paddle_order_id', tx.reference_id);
						}
					}
					console.log("✅ Tables Wallet et Items mises à jour.");
				} catch (e) {
					console.error("Erreur markTransactionsAsProcessed:", e);
				}
			};

			// GESTION DES TRANSACTIONS PADDLE
			window.requestPendingTransactions = async function () {
				try {
					const { data, error } = await supabaseClient.rpc(
						"claim_pending_rewards"
					);
					if (error)
						throw error;
					if (window.on_transactions_received) {
						window.on_transactions_received(
							JSON.stringify(data || [])
						);
					}
				}

				catch (e) {
					console.error(e);
					if (window.on_transactions_received)
						window.on_transactions_received("[]");
				}
			};

			
			window.addEventListener("focus",()=>{
				console.log("👀 Retour sur le jeu");
				window.requestPendingTransactions();
			});

			// --- AUTOMATISMES ---
			

			// Synchroniser quand on quitte la page
			document.addEventListener("visibilitychange",()=>{
				if(document.visibilityState==="hidden"){
					window.syncCloud();
				}
			});
			
		</script>
		
		<!-- Bulle de conflit de sauvegarde -->
		<div id="sync-conflict-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center;">
			<div style="background:#1f1f1f; border:1px solid #fa5c5c; padding:25px; border-radius:8px; max-width:400px; text-align:center; color:white; font-family:sans-serif; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
				<h3 style="margin-top:0; color:#fa5c5c;">Conflit de sauvegarde</h3>
				<p>Tu viens de te connecter. Quelle progression veux-tu conserver ?</p>
				
				<div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
					<button id="btn-keep-local" style="background:#fa5c5c; color:white; border:none; padding:12px; border-radius:4px; cursor:pointer; font-weight:bold;">
						💾 GARDER MA SESSION ACTUELLE<br>
						<span style="font-size:10px; font-weight:normal; opacity:0.8;">(Écrase la sauvegarde sur ton compte)</span>
					</button>
					
					<button id="btn-keep-cloud" style="background:#444; color:white; border:none; padding:12px; border-radius:4px; cursor:pointer; font-weight:bold;">
						☁️ RÉCUPÉRER MON COMPTE<br>
						<span style="font-size:10px; font-weight:normal; opacity:0.8;">(Écrase ta progression actuelle)</span>
					</button>
				</div>
			</div>
		</div>
	</body>
</html>
