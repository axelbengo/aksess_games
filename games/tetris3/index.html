		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

.btn-paddle-overlay {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 28px;
        font-size: 16px;
        font-weight: bold;
        color: #ffffff;
        background-color: #00b374; /* Vert Paddle */
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        transition: background 0.2s, transform 0.1s;
        z-index: 9999; /* Reste impérativement au-dessus du canvas */
    }
    .btn-paddle-overlay:hover { background-color: #009a63; }
    .btn-paddle-overlay:active { transform: translateX(-50%) scale(0.98); }

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>
		<button class="btn-paddle-overlay" onclick="demanderAchat(event,'pri_01kt9ahzm779msh6zqp95gg5xm')">🛒 ACHETER VIA BACKEND</button>
		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":41384,"index.wasm":36021473},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = true;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
		
		<script type="module">
			import { GameSync } from '../../js/game-sync.js';
			import { supabaseClient, PADDLE_ENV, PADDLE_CLIENT_TOKEN } from "../../js/config.js?v=1.0.2";


			// 2. Initialisation Paddle
			if (window.Paddle) {
				Paddle.Environment.set(PADDLE_ENV);
				Paddle.Initialize({ 
					token: PADDLE_CLIENT_TOKEN,
					eventCallback: (data) => { if (data.name === "checkout.error") console.error(data.data); }
				});
			} else {
				console.error("❌ Le script Paddle n'a pas pu être chargé (vérifiez le bloquage COEP/Adblock)");
			}

			// 3. Détermination du Slug (nom du jeu)
			const pathParts = window.location.pathname.split('/').filter(p => p !== "");
			const gamesIndex = pathParts.indexOf("games");
			const slug = (gamesIndex !== -1 && pathParts[gamesIndex + 1]) ? pathParts[gamesIndex + 1] : "default";

			// --- FONCTIONS EXPOSÉES À GODOT ---

			// CHARGEMENT DIRECT(Appelé par SaveManager._ready)
			window.requestRemoteData = async function() {
				try {
					console.log("📥 JS: Récupération des données...");
					const data = await GameSync.load(slug);
					
					if (window.on_data_received) {
						if (data === "NETWORK_ERROR") {
							window.on_data_received("NETWORK_ERROR");
						} else if (!data) {
							window.on_data_received("null");
						} else {
							// OBLIGATOIRE : On convertit l'objet en texte JSON pour Godot
							window.on_data_received(JSON.stringify(data)); 
						}
					}
				} catch (e) {
					console.error(e);
					if (window.on_data_received) window.on_data_received("NETWORK_ERROR");
				}
			};

			// SAUVEGARDE LOCALE (Appelé par SaveManager.update_stat)
			window.saveLocal = function(jsonStr) {
				try {
					GameSync.saveLocally(slug, JSON.parse(jsonStr));
				}
				catch(e){
					console.error(e);
				}
			};

			// SYNCHRONISATION CLOUD (Appelé par SaveManager.force_cloud_sync)
			window.syncCloud = async function() {
				console.log("☁️ Tentative de synchronisation...");
				try {
					await GameSync.sync(slug);
				}
				catch(e){
					console.error(e);
				}
			};

			// ACHAT
			window.demanderAchat = async function(event, priceId) {
				if (event) { event.preventDefault(); event.stopPropagation(); }
				const checkoutUrl = `../../checkout.html?price_id=${priceId}&game=${slug}`;
				window.open(checkoutUrl, "_blank");
			};
			
			// Récupère les intentions annulées ou échouées non encore vues par le jeu
			window.getFailedIntents = async function() {
				const { data: { user } } = await supabaseClient.auth.getUser();
				if (!user) return "[]";

				const { data, error } = await supabaseClient
					.from('payment_intents')
					.select('id, status, paddle_price_id')
					.eq('user_id', user.id)
					.in('status', ['canceled', 'failed', 'abandoned']) // On cherche ces statuts
					.is('completed_at', null); // On utilise cette colonne ou une autre pour savoir si c'est "nouveau"

				return JSON.stringify(data || []);
			};

			// Marque une intention comme "traitée" (pour ne plus afficher le message d'erreur)
			window.markIntentAsNotified = async function(intentId) {
				// On peut par exemple mettre une date dans completed_at pour dire "le joueur a vu l'erreur"
				await supabaseClient
					.from('payment_intents')
					.update({ completed_at: new Date().toISOString() }) 
					.eq('id', intentId);
			};

			// GESTION DES TRANSACTIONS PADDLE
			window.requestPendingTransactions = async function () {
				try {
					const { data, error } = await supabaseClient.rpc(
						"claim_pending_rewards"
					);
					if (error)
						throw error;
					if (window.on_transactions_received) {
						window.on_transactions_received(
							JSON.stringify(data || [])
						);
					}
				}

				catch (e) {
					console.error(e);
					if (window.on_transactions_received)
						window.on_transactions_received("[]");
				}
			};

			
			window.addEventListener("focus",()=>{
				console.log("👀 Retour sur le jeu");
				window.requestPendingTransactions();
			});

			// --- AUTOMATISMES ---
			

			// Synchroniser quand on quitte la page
			document.addEventListener("visibilitychange",()=>{
				if(document.visibilityState==="hidden"){
					window.syncCloud();
				}
			});
			
		</script>
	</body>
</html>
